name: Release

# Tag a version (v0.1.0) to build signed installers for every desktop OS
# plus the server binary + Docker image. Signing/notarization activate
# automatically when the corresponding repository secrets are present;
# without them the build still produces unsigned artifacts.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    name: desktop (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: onyx-desktop/pnpm-lock.yaml

      - name: Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libssl-dev

      - name: Install frontend deps
        working-directory: onyx-desktop
        run: pnpm install --frozen-lockfile

      - name: Build signed app
        uses: tauri-apps/tauri-action@v0
        env:
          # macOS signing + notarization (no-op if unset).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code signing (no-op if unset).
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          # Tauri updater signing key (no-op if unset).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: onyx-desktop
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: "Onyx ${{ github.ref_name }}"
          releaseDraft: true
          includeUpdaterJson: true

  server:
    name: server binary + image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build server (static-ish release)
        run: cargo build --release -p onyx-server
      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/onyx-server dist/
          tar -C dist -czf onyx-server-${{ github.ref_name }}-linux-x86_64.tar.gz onyx-server
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: onyx-server-*.tar.gz
          draft: true
      - name: Build & push Docker image
        if: ${{ env.DOCKERHUB_TOKEN != '' }}
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "${DOCKERHUB_TOKEN}" | docker login -u onyxnotes --password-stdin
          docker build -t onyxnotes/onyx-server:${{ github.ref_name }} \
            -t onyxnotes/onyx-server:latest -f onyx-server/Dockerfile .
          docker push onyxnotes/onyx-server:${{ github.ref_name }}
          docker push onyxnotes/onyx-server:latest
