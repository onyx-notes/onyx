name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # Portable crates on every OS: the vault engine, crypto, sync, protocol,
  # markdown, and server are pure Rust with no Tauri/webview dependency, so
  # they lint and test identically everywhere. The Tauri desktop app and its
  # native plugin are excluded here and covered by the `desktop` job (they
  # need platform webview toolchains).
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --exclude onyx-desktop --exclude tauri-plugin-onyx-secrets --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace --exclude onyx-desktop --exclude tauri-plugin-onyx-secrets

  # The Tauri desktop app (lint + integration tests, incl. sync_e2e and the
  # flaky-network harness) on Linux, where the GTK/WebKit toolchain is set up.
  desktop:
    name: desktop (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install desktop system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            pkg-config
      - name: Clippy (desktop)
        run: cargo clippy -p onyx-desktop -p tauri-plugin-onyx-secrets --all-targets -- -D warnings
      - name: Test (desktop)
        run: cargo test -p onyx-desktop -p tauri-plugin-onyx-secrets

  deny:
    name: licenses & advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2

  perf:
    name: perf budgets (10k corpus)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Enforce perf budgets
        run: cargo run --release -p xtask -- ci-perf /tmp/onyx-ci-corpus 10000

  mobile-check:
    name: mobile cross-compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
      - name: Check Android target (cfg-gate rot detector)
        run: |
          export NDK="$ANDROID_NDK_LATEST_HOME"
          export TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$TOOLCHAIN/aarch64-linux-android35-clang"
          export CC_aarch64_linux_android="$TOOLCHAIN/aarch64-linux-android35-clang"
          export AR_aarch64_linux_android="$TOOLCHAIN/llvm-ar"
          cargo check -p onyx-desktop --target aarch64-linux-android
