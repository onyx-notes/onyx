[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "AGPL-3.0-or-later",
    "AGPL-3.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# The server must never link the vault engine or markdown parser —
# the dependency graph is part of the zero-knowledge proof.
deny = [
    { crate = "onyx-core", wrappers = ["onyx-testkit"] },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
